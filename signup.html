<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Candy's Kitchen</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome icons will be added locally if needed -->
</head>
<body>
    <!-- Navigation -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="logo-font text-2xl font-bold text-purple-600">Candy's Kitchen</span>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-purple-600 transition duration-300">Home</a>
                    <div class="dropdown">
                        <a href="menu.html" class="text-gray-700 hover:text-purple-600 transition duration-300 flex items-center">
                            Menu <i class="fas fa-chevron-down ml-1 text-xs"></i>
                        </a>
                        <div class="dropdown-content">
                            <a href="menu.html#mains">Main Dishes</a>
                            <a href="desserts.html">Desserts</a>
                            <a href="menu.html#drinks">Drinks</a>
                            <a href="menu.html#all">All Items</a>
                        </div>
                    </div>
                    <a href="recipes.html" class="text-gray-700 hover:text-purple-600 transition duration-300">Recipes</a>
                    <a href="#about" class="text-gray-700 hover:text-purple-600 transition duration-300">About</a>
                    <a href="#contact" class="text-gray-700 hover:text-purple-600 transition duration-300">Contact</a>
                    <div class="flex items-center space-x-2">
                        <a href="signin.html" class="text-gray-700 hover:text-purple-600 transition duration-300">
                            <i class="fas fa-sign-in-alt mr-1"></i>Sign In
                        </a>
                        <a href="signup.html" class="text-purple-600 font-semibold">Sign Up</a>
                    </div>
                    <a href="order.html" class="bg-purple-600 text-white px-4 py-2 rounded-full hover:bg-purple-700 transition duration-300 relative">
                        <i class="fas fa-shopping-cart mr-2"></i>Order
                        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs" style="display: none;">0</span>
                    </a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="text-gray-700 hover:text-purple-600">
                        <i class="fas fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sign Up Section -->
    <section class="min-h-screen flex items-center justify-center auth-container">
        <div class="auth-card p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Join Candy's Kitchen</h1>
                <p class="text-gray-600">Create your account to order delicious meals and leave reviews</p>
            </div>

            <form id="signup-form" class="space-y-6">
                <!-- Name Input -->
                <div class="input-group">
                    <label class="block text-gray-700 font-semibold mb-2" for="name">Full Name</label>
                    <div class="relative">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" 
                               class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-600" required>
                    </div>
                </div>

                <!-- Email Input -->
                <div class="input-group">
                    <label class="block text-gray-700 font-semibold mb-2" for="email">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" name="email" placeholder="Enter your email" 
                               class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-600" required>
                    </div>
                </div>

                <!-- Phone Input -->
                <div class="input-group">
                    <label class="block text-gray-700 font-semibold mb-2" for="phone">Phone Number</label>
                    <div class="relative">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" 
                               class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-600" required>
                    </div>
                </div>

                <!-- Address Input -->
                <div class="input-group">
                    <label class="block text-gray-700 font-semibold mb-2" for="address">Delivery Address</label>
                    <div class="relative">
                        <i class="fas fa-home input-icon"></i>
                        <input type="text" id="address" name="address" placeholder="Enter your delivery address" 
                               class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-600" required>
                    </div>
                </div>

                <!-- Password Input -->
                <div class="input-group">
                    <label class="block text-gray-700 font-semibold mb-2" for="password">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="Create a password (min 6 chars)" 
                               class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-600" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
                    </div>
                </div>

                <!-- Confirm Password Input -->
                <div class="input-group">
                    <label class="block text-gray-700 font-semibold mb-2" for="confirm-password">Confirm Password</label>
                    <div class="relative">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" 
                               class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-600" required>
                        <i class="fas fa-eye password-toggle" onclick="toggleConfirmPassword()"></i>
                    </div>
                </div>

                <!-- Terms & Sign Up Button -->
                <div class="space-y-4">
                    <label class="flex items-center">
                        <input type="checkbox" id="terms" name="terms" class="mr-2" required>
                        <span class="text-gray-600">I agree to the Terms of Service and Privacy Policy</span>
                    </label>

                    <button type="submit" class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition duration-300">
                        <i class="fas fa-user-plus mr-2"></i>Create Account
                    </button>

                    <!-- Sign In Link -->
                    <div class="text-center mt-4">
                        <p class="text-gray-600">
                            Already have an account? 
                            <a href="signin.html" class="text-purple-600 hover:text-purple-700 font-semibold">Sign In</a>
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = passwordInput.nextElementSibling;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        function toggleConfirmPassword() {
            const confirmPasswordInput = document.getElementById('confirm-password');
            const toggleIcon = confirmPasswordInput.nextElementSibling;
            
            if (confirmPasswordInput.type === 'password') {
                confirmPasswordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                confirmPasswordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Handle sign up form submission
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const terms = document.getElementById('terms').checked;
            
            // Basic validation
            if (!name || !email || !phone || !address || !password || !confirmPassword) {
                alert('Please fill in all fields');
                return;
            }
            
            if (!terms) {
                alert('Please agree to the Terms of Service and Privacy Policy');
                return;
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address');
                return;
            }
            
            // Password validation
            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            // Phone validation
            const phoneRegex = /^[\d\s\-\(\)]+$/;
            if (!phoneRegex.test(phone.replace(/\s/g, ''))) {
                alert('Please enter a valid phone number');
                return;
            }
            
            // Check if user already exists
            const users = JSON.parse(localStorage.getItem('candysKitchenUsers')) || [];
            const existingUser = users.find(u => u.email === email);
            
            if (existingUser) {
                alert('An account with this email already exists. Please sign in instead.');
                return;
            }
            
            // Create new user
            const newUser = {
                id: Date.now(),
                name: name,
                email: email,
                phone: phone,
                address: address,
                password: password, // In production, this should be hashed
                createdAt: new Date().toISOString(),
                orders: [],
                reviews: []
            };
            
            users.push(newUser);
            localStorage.setItem('candysKitchenUsers', JSON.stringify(users));
            
            alert('Account created successfully! Please sign in to continue.');
            window.location.href = 'signin.html';
        });

        // Mobile menu toggle
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.createElement('div');
        mobileMenu.id = 'mobile-menu';
        mobileMenu.className = 'hidden md:hidden bg-white border-t';
        mobileMenu.innerHTML = `
            <div class="px-2 pt-2 pb-3 space-y-1">
                <a href="index.html" class="block px-3 py-2 text-gray-700 hover:text-purple-600">Home</a>
                <a href="menu.html" class="block px-3 py-2 text-gray-700 hover:text-purple-600">Menu</a>
                <a href="recipes.html" class="block px-3 py-2 text-gray-700 hover:text-purple-600">Recipes</a>
                <a href="#about" class="block px-3 py-2 text-gray-700 hover:text-purple-600">About</a>
                <a href="#contact" class="block px-3 py-2 text-gray-700 hover:text-purple-600">Contact</a>
                <div class="border-t pt-2 mt-2">
                    <a href="signin.html" class="block px-3 py-2 text-gray-700 hover:text-purple-600">Sign In</a>
                    <a href="signup.html" class="block px-3 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">Sign Up</a>
                </div>
                <a href="order.html" class="block px-3 py-2 text-purple-600 font-semibold">Order</a>
            </div>
        `;

        mobileMenuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            document.body.appendChild(mobileMenu);
        });
    </script>
</body>
</html>
